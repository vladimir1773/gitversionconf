# CD branching model for the deploy repo.
#
# Pipeline contract:
# - main/master builds/tags protected production candidates as: <semver>
# - hotfix/* builds/tags protected production hotfixes as: <full-semver>
# - feature/* may use self-created tags for x0 deployments/E2E automation;
#   these tags are not authoritative for main/master version calculation
# - use MajorMinorPatch for main/master tags
# - use FullSemVer for protected hotfix tags
#
# Protect these tag patterns in the Git host/pipeline:
# - ^v?\d+\.\d+\.\d+$
# - ^v?\d+\.\d+\.\d+-hotfix\.\d+$

workflow: GitHubFlow/v1
mode: ContinuousDelivery
# Only stable protected main/master tags are GitVersion version sources.
# Free feature tags and hotfix deployment tags must not influence main/master
# after merge.
tag-prefix: '[vV]?(?=\d+\.\d+\.\d+$)'
semantic-version-format: Strict
commit-message-incrementing: Enabled

# Default bump is patch. Use commit messages in merged history to request
# explicit bumps on main/master or hotfix:
# +semver: patch
# +semver: minor
# +semver: major
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'

branches:
  main:
    regex: ^(?:main|master)$
    label: ''
    mode: ContinuousDelivery
    increment: Patch
    prevent-increment:
      of-merged-branch: false
      when-current-commit-tagged: true
    track-merge-message: true
    source-branches:
      - feature
      - hotfix
    is-main-branch: true
    is-release-branch: false
    pre-release-weight: 55000

  hotfix:
    regex: ^hotfix(es)?[/-](?<BranchName>.+)
    label: hotfix
    mode: ContinuousDelivery
    increment: None
    prevent-increment:
      when-current-commit-tagged: true
    track-merge-message: true
    source-branches:
      - main
    is-main-branch: false
    is-release-branch: true
    pre-release-weight: 30000

  feature:
    regex: ^features?[/-](?<BranchName>.+)
    label: '{BranchName}'
    mode: ManualDeployment
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    track-merge-message: true
    source-branches:
      - main
      - hotfix
    is-main-branch: false
    is-release-branch: false
    pre-release-weight: 30000

  pull-request:
    regex: ^(pull-requests|pull|pr)[/-](?<Number>\d*)
    label: PullRequest{Number}
    mode: ContinuousDelivery
    increment: Inherit
    prevent-increment:
      of-merged-branch: true
      when-current-commit-tagged: false
    track-merge-message: true
    source-branches:
      - main
      - feature
      - hotfix
    pre-release-weight: 30000

  # Explicitly keep release/* and develop out of the deploy-repo model.
  release:
    regex: ^$

  develop:
    regex: ^$

  unknown:
    regex: (?<BranchName>.+)
    label: '{BranchName}'
    mode: ManualDeployment
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: true
    source-branches:
      - main
      - feature
      - hotfix
    is-main-branch: false
    is-release-branch: false

ignore:
  sha: []
  paths: []
